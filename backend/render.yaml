services:
  - type: web
    name: inscricoes-evento-backend
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: INFINITEPAY_HANDLE
        sync: false
      - key: PIX_CHAVE
        sync: false
