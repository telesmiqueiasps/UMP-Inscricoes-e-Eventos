<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realizar Inscrição - Plataforma de Eventos</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="brand">
      <div class="brand-icon">E</div>
      <span>EventosHub</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html" class="nav-link">Voltar para Início</a></li>
    </ul>
  </nav>

  <main class="container" style="max-width: 800px;">
    
    <div class="card" id="event-summary" style="margin-bottom: 2rem; background: var(--primary-light); border-color: #C7D2FE;">
      Carregando resumo do evento...
    </div>

    <!-- Etapa 1: Autenticação -->
    <div class="card" id="step-1" style="display: none;">
      <h3 class="card-title">1. Seus Dados Pessoais</h3>
      <p class="card-desc">Crie sua conta ou faça login para vincular sua inscrição.</p>
      
      <form id="form-auth-wizard">
        <div class="form-group">
          <label class="form-label">Nome Completo</label>
          <input type="text" id="nome" class="form-control" placeholder="Seu nome completo" required>
        </div>

        <div class="grid-3" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 0;">
          <div class="form-group">
            <label class="form-label">E-mail</label>
            <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">CPF</label>
            <input type="text" id="cpf" class="form-control" placeholder="000.000.000-00">
          </div>
        </div>

        <div class="grid-3" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 0;">
          <div class="form-group">
            <label class="form-label">Telefone / WhatsApp</label>
            <input type="text" id="telefone" class="form-control" placeholder="(00) 00000-0000">
          </div>
          <div class="form-group">
            <label class="form-label">Crie uma Senha</label>
            <input type="password" id="senha" class="form-control" placeholder="******" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          Continuar para Pagamento &rarr;
        </button>
      </form>
    </div>

    <!-- Etapa 2: Escolha de Pagamento -->
    <div class="card" id="step-2" style="display: none;">
      <h3 class="card-title">2. Escolha a Forma de Pagamento</h3>
      <p class="card-desc">Selecione como deseja efetuar o pagamento da sua inscrição.</p>

      <form id="form-pagamento">
        <div style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem;">
          <label style="display: flex; align-items: center; gap: 1rem; padding: 1rem; border: 1.5px solid var(--border-color); border-radius: var(--radius-md); cursor: pointer;">
            <input type="radio" name="forma_pagamento" value="PIX" checked>
            <div>
              <strong>Pix à Vista</strong>
              <div style="font-size: 0.85rem; color: var(--text-muted);">Aprovação instantânea via QR Code ou Copia e Cola</div>
            </div>
          </label>

          <label style="display: flex; align-items: center; gap: 1rem; padding: 1rem; border: 1.5px solid var(--border-color); border-radius: var(--radius-md); cursor: pointer;">
            <input type="radio" name="forma_pagamento" value="INFINITEPAY">
            <div>
              <strong>Cartão de Crédito / Débito (InfinitePay)</strong>
              <div style="font-size: 0.85rem; color: var(--text-muted);">Checkout rápido e seguro via InfinitePay</div>
            </div>
          </label>

          <label style="display: flex; align-items: center; gap: 1rem; padding: 1rem; border: 1.5px solid var(--border-color); border-radius: var(--radius-md); cursor: pointer;">
            <input type="radio" name="forma_pagamento" value="PARCELADO">
            <div>
              <strong>Parcelado (Carnê / Pix Mensal)</strong>
              <div style="font-size: 0.85rem; color: var(--text-muted);">Divida o valor em até N vezes no Pix com PDF por parcela</div>
            </div>
          </label>
        </div>

        <div class="form-group" id="parcelas-group" style="display: none;">
          <label class="form-label">Quantidade de Parcelas</label>
          <select id="num_parcelas" class="form-control"></select>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.05rem;">
          Finalizar Inscrição
        </button>
      </form>
    </div>

    <!-- Etapa 3: Resultado / Qr Code / PDF -->
    <div class="card" id="step-3" style="display: none;">
      <div id="payment-result"></div>
    </div>

  </main>

  <script src="js/api.js"></script>
  <script src="js/inscricao.js"></script>
</body>
</html>
