<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciamento de Inscrições - Admin</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="admin-layout" id="admin-inscricoes">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">⚡ Admin Hub</div>
      <ul class="sidebar-menu">
        <li><a href="index.html" class="sidebar-link">📊 Dashboard & Eventos</a></li>
        <li><a href="inscricoes.html" class="sidebar-link active">📝 Inscrições</a></li>
        <li><a href="pagamentos.html" class="sidebar-link">💳 Pagamentos & Parcelas</a></li>
        <li><a href="configuracoes.html" class="sidebar-link">⚙️ Configurações</a></li>
        <li><a href="javascript:void(0)" onclick="logoutAdmin()" class="sidebar-link" style="color: #F87171; margin-top: 2rem;">🚪 Sair</a></li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      
      <div style="margin-bottom: 2rem;">
        <h1 style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.75rem;">Gerenciar Inscrições</h1>
        <p style="color: var(--text-muted);">Consulte e altere o status das inscrições de participantes</p>
      </div>

      <!-- Filtros -->
      <div class="card" style="padding: 1.25rem;">
        <div style="display: grid; grid-template-columns: 2fr 2fr 1.5fr 1.5fr; gap: 1rem; align-items: end;">
          <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">Selecionar Evento</label>
            <select id="filter-evento" class="form-control" onchange="onEventoFilterChange()">
              <option value="">Todos os Eventos</option>
            </select>
          </div>

          <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">Buscar Participante</label>
            <input type="text" id="filter-search" class="form-control" placeholder="Nome, e-mail, CPF..." onkeyup="loadInscricoes()">
          </div>
          
          <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">Filtrar por Status</label>
            <select id="filter-status" class="form-control" onchange="loadInscricoes()">
              <option value="">Todos os Status</option>
              <option value="CONFIRMADA">CONFIRMADA</option>
              <option value="PENDENTE">PENDENTE</option>
              <option value="CANCELADA">CANCELADA</option>
            </select>
          </div>

          <div style="display: flex; gap: 0.5rem; justify-content: flex-end;">
            <button class="btn btn-outline" style="padding: 0.5rem 1rem; height: 42px;" onclick="exportarCSV()">📥 Excel</button>
            <button class="btn btn-outline" style="padding: 0.5rem 1rem; height: 42px;" onclick="imprimirPDF()">🖨️ Imprimir</button>
          </div>
        </div>
      </div>

      <!-- Tabela -->
      <div class="card">
        <div style="overflow-x: auto;">
          <table id="inscricoes-table">
            <thead id="inscricoes-table-head">
              <tr>
                <th>ID</th>
                <th>Participante</th>
                <th>Evento</th>
                <th>Forma Pag.</th>
                <th>Valor Total</th>
                <th>Status</th>
                <th>Ações Manuais</th>
              </tr>
            </thead>
            <tbody id="inscricoes-table-body">
              <tr><td colspan="7">Carregando inscrições...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>

  </div>

  <script src="js/api.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
